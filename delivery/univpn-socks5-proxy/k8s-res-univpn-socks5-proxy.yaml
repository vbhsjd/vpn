# UniVPN SOCKS5 Proxy — K8s resources (namespace: res)
# Fill in real VPN credentials in the Secret stringData before applying.
# Usage: kubectl apply -f k8s-res-univpn-socks5-proxy.yaml -n res

---
apiVersion: v1
kind: Secret
metadata:
  name: univpn-proxy-secret
  namespace: res
type: Opaque
stringData:
  VPN_SERVER: "vpn1.example.com"
  VPN_PORT: "443"
  VPN_USER: "<replace-with-vpn-user>"
  VPN_PASSWORD: "<replace-with-vpn-password>"
  VPN2_SERVER: "vpn2.example.com"
  VPN2_PORT: "443"
  VPN2_USER: "<replace-with-vpn2-user>"
  VPN2_PASSWORD: "<replace-with-vpn2-password>"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: univpn-socks5-proxy
  namespace: res
  labels:
    app: univpn-socks5-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: univpn-socks5-proxy
  template:
    metadata:
      labels:
        app: univpn-socks5-proxy
    spec:
      containers:
        - name: univpn-socks5-proxy
          image: univpn-socks5-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: socks5
              containerPort: 1080
              protocol: TCP
          envFrom:
            - secretRef:
                name: univpn-proxy-secret
          env:
            - name: UNIVPN_CONNECT_TIMEOUT
              value: "120"
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_MODULE
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/univpn-proxy-ready"]
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            exec:
              command: ["/usr/local/bin/healthcheck.sh"]
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice

---
apiVersion: v1
kind: Service
metadata:
  name: univpn-socks5-proxy-svc
  namespace: res
  labels:
    app: univpn-socks5-proxy
spec:
  type: ClusterIP
  selector:
    app: univpn-socks5-proxy
  ports:
    - name: socks5
      port: 1080
      targetPort: 1080
      protocol: TCP
